<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login NIS | Absensi PKL</title>
    <link rel="icon" type="image/png" href="http://localhost:8000/storage/favicons/dvfqJq5WYlsKcSOqMPqmTxnfyCW0qy2GwVgaKrot.png">
    <style>
        :root {
            --bg: #f5ede4;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #ea580c;
            --primary-strong: #c2410c;
            --border: #fed7aa;
            --input: #fffaf5;
            --danger: #b91c1c;
            --success: #166534;
            --ring: rgba(234, 88, 12, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 22px;
            background:
                radial-gradient(circle at top right, #ffe9cf 0%, transparent 45%),
                radial-gradient(circle at left bottom, #fdd9b5 0%, transparent 38%),
                var(--bg);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        .wrap {
            width: min(460px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 18px 40px rgba(124, 45, 18, 0.16);
        }

        .brand { text-align: center; margin-bottom: 18px; }
        .brand img { width: 240px; height: 96px; object-fit: contain; }
        .brand-name {
            margin: 0;
            font-size: 34px;
            line-height: 1.05;
            font-weight: 800;
            color: #7c2d12;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }
        .subtitle { margin: 0; color: var(--muted); font-size: 18px; }

        .msg {
            margin: 10px 0;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
        }

        .err { color: var(--danger); background: #fef2f2; border: 1px solid #fecaca; }
        .ok { color: var(--success); background: #f0fdf4; border: 1px solid #bbf7d0; }

        form { margin-top: 14px; }

        label {
            display: block;
            margin: 14px 0 7px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            background: var(--input);
            color: var(--text);
            outline: none;
            transition: border-color .15s ease, box-shadow .15s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--ring);
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap input {
            padding-right: 46px;
        }

        .toggle-pass {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            cursor: pointer;
            padding: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-pass img {
            width: 20px;
            height: 20px;
            display: block;
        }

        .verify-box {
            margin-top: 14px;
            border: 1px dashed var(--border);
            background: #fffaf5;
            border-radius: 12px;
            padding: 12px;
        }

        .verify-note {
            margin: 0 0 10px;
            color: #9a3412;
            font-weight: 600;
            font-size: 15px;
        }

        .btn {
            width: 100%;
            margin-top: 16px;
            border: 0;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(180deg, var(--primary), var(--primary-strong));
            cursor: pointer;
        }

        .btn:hover { filter: brightness(1.03); }

        .links {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 13px;
        }

        .links a { color: #9a3412; text-decoration: none; }
        .links a:hover { text-decoration: underline; }

        @media (max-width: 520px) {
            .wrap { padding: 22px 18px; }
            .subtitle { font-size: 16px; }
            label { font-size: 22px; }
        }
    </style>
            <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    </head>
<body>
<div class="wrap">
    <div class="brand">
                    <img src="http://localhost:8000/storage/logos/jaNVkfuHH6vhN7LqUDnDt0BHaDjgDRDPPWAnIWe9.png" alt="Logo">
                <p class="subtitle">Absensi PKL</p>
    </div>

        
    <form method="POST" action="http://localhost:8000/login">
        <input type="hidden" name="_token" value="qTRN6Jrb0SyhfiZu2T14qv5g3LLG1fUmyCPpllGt" autocomplete="off">
        <label for="identifier">NIS</label>
        <input type="text" id="identifier" name="identifier" value="" required autofocus>
        
        <label for="password">Password</label>
        <div class="password-wrap">
            <input type="password" id="password" name="password" required>
            <button type="button" class="toggle-pass" data-target="password" aria-label="Tampilkan password" data-show="http://localhost:8000/icons/eye.png" data-hide="http://localhost:8000/icons/invisible.png">
                <img src="http://localhost:8000/icons/eye.png" alt="Toggle Password">
            </button>
        </div>

                    <div class="verify-box">
                <div class="g-recaptcha" data-sitekey="6LeAlJ8sAAAAALdij0GWtTh3PUqHLhCiwD6P74Qp"></div>
            </div>
        
        
        <button class="btn" type="submit">Masuk</button>
    </form>

    <div class="links" style="justify-content: flex-end;">
        <a href="http://localhost:8000/forgot-password">Lupa Password</a>
    </div>
</div>
<script>
    document.querySelectorAll('.toggle-pass').forEach((button) => {
        button.addEventListener('click', () => {
            const target = document.getElementById(button.dataset.target);
            if (!target) return;

            const isPassword = target.type === 'password';
            target.type = isPassword ? 'text' : 'password';
            const icon = button.querySelector('img');
            if (icon) {
                icon.src = isPassword ? button.dataset.hide : button.dataset.show;
            }
            button.setAttribute('aria-label', isPassword ? 'Sembunyikan password' : 'Tampilkan password');
        });
    });
</script>
</body>
</html>
